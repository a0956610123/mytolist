<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TodoList 管理系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='common.css') }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- 侧边栏 -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-check2-square"></i>
            TodoList
        </div>
        <div class="sidebar-nav">
            <a href="/" class="nav-item {% if active_page == 'index' %}active{% endif %}">
                <i class="bi bi-grid-1x2"></i> 仪表盘
            </a>
            <a href="/todolist" class="nav-item {% if active_page == 'todolist' %}active{% endif %}">
                <i class="bi bi-list-check"></i> 待办事项
            </a>
            <a href="/finance" class="nav-item {% if active_page == 'finance' %}active{% endif %}">
                <i class="bi bi-wallet2"></i> 收支查询
            </a>
        </div>
        <div style="position:absolute;bottom:1rem;left:0;right:0;padding:0 1.25rem;font-size:.75rem;color:rgba(255,255,255,.3);">
            v1.0
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="main-content">
        <header class="main-header">
            <button class="btn btn-link d-md-none text-dark p-0 me-2" onclick="document.getElementById('sidebar').classList.toggle('show')">
                <i class="bi bi-list" style="font-size:1.3rem"></i>
            </button>
            <h5>{% block header %}仪表盘{% endblock %}</h5>
        </header>
        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="{{ url_for('static', filename='common.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
