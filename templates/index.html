{% extends "layout.html" %}
{% block title %}仪表盘 - TodoList 管理系统{% endblock %}
{% block header %}<i class="bi bi-grid-1x2 me-2"></i>仪表盘{% endblock %}

{% block content %}
{% set active_page = 'index' %}

<!-- 快捷入口 -->
<div class="row g-3 mb-4">
    <div class="col-md-6">
        <a href="/todolist" class="text-decoration-none">
            <div class="card border-0 shadow-sm" style="border-radius:12px;transition:all .2s;" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform=''">
                <div class="card-body d-flex align-items-center p-4">
                    <div class="rounded-3 d-flex align-items-center justify-content-center me-3" style="width:56px;height:56px;background:var(--primary-bg);">
                        <i class="bi bi-list-check" style="font-size:1.8rem;color:var(--primary)"></i>
                    </div>
                    <div>
                        <h6 class="mb-1 text-dark">待办事项</h6>
                        <small class="text-muted">管理你的任务清单，跟踪进度</small>
                    </div>
                    <i class="bi bi-chevron-right ms-auto text-muted"></i>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-6">
        <a href="/finance" class="text-decoration-none">
            <div class="card border-0 shadow-sm" style="border-radius:12px;transition:all .2s;" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform=''">
                <div class="card-body d-flex align-items-center p-4">
                    <div class="rounded-3 d-flex align-items-center justify-content-center me-3" style="width:56px;height:56px;background:#fef3c7;">
                        <i class="bi bi-wallet2" style="font-size:1.8rem;color:#d97706"></i>
                    </div>
                    <div>
                        <h6 class="mb-1 text-dark">收支查询</h6>
                        <small class="text-muted">追踪收入支出，查看财务汇总</small>
                    </div>
                    <i class="bi bi-chevron-right ms-auto text-muted"></i>
                </div>
            </div>
        </a>
    </div>
</div>

<!-- 待办概览 -->
<div class="card mb-3">
    <div class="card-header">
        <span><i class="bi bi-list-check me-2 text-primary"></i>待办概览</span>
        <a href="/todolist" class="btn btn-outline-primary btn-sm">查看全部 <i class="bi bi-arrow-right"></i></a>
    </div>
    <div class="card-body" id="todoOverview">
        <div class="text-center py-3 text-muted">加载中...</div>
    </div>
</div>

<!-- 本月财务概览 -->
<div class="card">
    <div class="card-header">
        <span><i class="bi bi-wallet2 me-2 text-warning"></i>本月财务概览</span>
        <a href="/finance" class="btn btn-outline-primary btn-sm">查看全部 <i class="bi bi-arrow-right"></i></a>
    </div>
    <div class="card-body" id="financeOverview">
        <div class="text-center py-3 text-muted">加载中...</div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(function () {
    loadTodoOverview();
    loadFinanceOverview();
});

function loadTodoOverview() {
    $.get('/api/todolist/stats', function (res) {
        var container = $('#todoOverview');
        if (res.code === 0 && res.data) {
            var d = res.data;
            var html = '<div class="row g-2">' +
                '<div class="col-3 col-md-3"><div class="text-center p-2 rounded bg-primary-subtle"><div class="fw-bold text-primary fs-4">' + d.total + '</div><small class="text-muted">总待办</small></div></div>' +
                '<div class="col-3 col-md-3"><div class="text-center p-2 rounded bg-success-subtle"><div class="fw-bold text-success fs-4">' + d.completed + '</div><small class="text-muted">已完成</small></div></div>' +
                '<div class="col-3 col-md-3"><div class="text-center p-2 rounded bg-warning-subtle"><div class="fw-bold text-warning fs-4">' + d.pending + '</div><small class="text-muted">待完成</small></div></div>' +
                '<div class="col-3 col-md-3"><div class="text-center p-2 rounded bg-info-subtle"><div class="fw-bold text-info fs-4">' + d.completion_rate + '%</div><small class="text-muted">完成率</small></div></div>' +
                '</div>';

            // 高优先级的待办
            if (d.high_priority > 0) {
                html += '<div class="mt-2 p-2 rounded" style="background:#fef2f2;"><i class="bi bi-exclamation-triangle text-danger me-1"></i><span class="small text-danger">有 ' + d.high_priority + ' 个高优先级待办待处理</span></div>';
            }

            container.html(html);
        } else {
            container.html('<div class="text-center py-3 text-muted">加载失败</div>');
        }
    }).fail(function () {
        $('#todoOverview').html('<div class="text-center py-3 text-muted">加载失败</div>');
    });
}

function loadFinanceOverview() {
    var mr = getMonthRange(0);
    $.get('/api/finance/summary', { start_date: mr.start, end_date: mr.end }, function (res) {
        var container = $('#financeOverview');
        if (res.code === 0 && res.data) {
            var d = res.data;
            var html = '<div class="row g-2">' +
                '<div class="col-4"><div class="text-center p-2 rounded bg-success-subtle"><div class="fw-bold text-success fs-5">¥' + parseFloat(d.total_income).toFixed(2) + '</div><small class="text-muted">收入</small></div></div>' +
                '<div class="col-4"><div class="text-center p-2 rounded bg-danger-subtle"><div class="fw-bold text-danger fs-5">¥' + parseFloat(d.total_expense).toFixed(2) + '</div><small class="text-muted">支出</small></div></div>' +
                '<div class="col-4"><div class="text-center p-2 rounded bg-primary-subtle"><div class="fw-bold text-primary fs-5">¥' + parseFloat(d.balance).toFixed(2) + '</div><small class="text-muted">结余</small></div></div>' +
                '</div>';
            container.html(html);
        } else {
            container.html('<div class="text-center py-3 text-muted">暂无数据</div>');
        }
    }).fail(function () {
        $('#financeOverview').html('<div class="text-center py-3 text-muted">加载失败</div>');
    });
}
</script>
{% endblock %}
